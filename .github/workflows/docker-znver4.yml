name: Build and Push CachyOS znver4 Docker Image

on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * *'
  push:
    branches:
      - 'master'

jobs:
  docker:
    runs-on: [self-hosted, znver4]
    permissions:
      contents: read
      packages: write
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      -
        name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile-znver4
          push: true
          tags: |
            ghcr.io/bopp-os/cachyos-docker/cachyos-znver4:znver4
            ghcr.io/bopp-os/cachyos-docker/cachyos-znver4:znver4-latest
            ghcr.io/bopp-os/cachyos-docker/cachyos-znver4:latest
